<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DHL Knowledge Base</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-robot" style="font-size: 48px; margin-bottom: 16px;"></i>
            <h1>DHL Knowledge Base</h1>
            <p>AI-Powered Automation System</p>
            <span class="dhl-badge"><i class="fas fa-box"></i> DHL Logistics Operations</span>
        </div>
        <div class="login-body">
            <div class="error-message" id="errorMsg">
                <i class="fas fa-exclamation-circle"></i> Invalid username or password
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            <div class="demo-credentials">
                <strong>Demo Credentials:</strong><br>
                Admin: admin / admin123<br>
                Editor: editor / editor123<br>
                Reviewer: reviewer / reviewer123
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const data = await login(username, password);
                
                if (data.success) {
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('errorMsg').style.display = 'block';
                    setTimeout(() => {
                        document.getElementById('errorMsg').style.display = 'none';
                    }, 3000);
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('Connection error. Make sure the server is running.');
            }
        });
    </script>
</body>
</html>
